front:
  text: 上清洞真智慧觀身大戒文承十智慧觀身大戒流景散漫映煥太虛積三千餘劫其文乃是元始天王受之太上髙聖道君於是相與登洞真之堂説而誦之以傳太微天帝及太極髙仙天王口口而巳不書於文太微天帝受戒時頌智慧起本無朗朗超十方結空峙玄霄諸天挹流芳其妙難思議虛感真實通有有無不有無無無不容智慧常觀身學道之所先眇眇任玄肆自然録我神天尊常擁護魔王為保言晃晃金剛軀超超太上前智慧生戒根真道戒為主三寶由是興髙聖所崇受泛此不死舟倐欻濟大有當此説戒時諸天來稽首道學不得殺生暨蠕動之蟲道學不得教人殺生暨蠕動之蟲道學不得飲酒道學不得教人飲酒道學不得綺語兩舌不信道學不得教人綺語兩舌不信道學不得淫犯百姓婦女道學不得教人淫犯百姓婦女道學不得竊盜人物道學不得教人竊盜人物道學不得嫉賢妬能道學不得教人嫉賢妬能道學不得背師恩愛道學不得教人背師恩愛道學不得不忠其上道學不得教人不忠其上道學不得罔其下道學不得教人罔其下道學不得欺誑同學未解之人道學不得教人欺誑同學未解之人道學不得輕慢弟子道學不得教人輕慢弟子道學不得口善心懷隂惡道學不得教人口善心懷隂惡道學不得説人過惡道學不得教人説人過惡道學不得重積七寶不散施四輩道學不得教人重積七寶不散施四輩道學不得樂人錢財雜物為己重擔道學不得教人樂人錢財雜物為己重擔道學不得畜刀仗兵器道學不得教人畜刀仗兵器道學不得養六畜道學不得教人養六畜道學不得金銀器食飲死厚葬骸骨道學不得教人金銀器食飲死厚葬骸骨道學不得貪樂榮祿道學不得教人貪樂榮祿道學不得燒敗世間寸寸之物道學不得教人燒敗世間寸寸之物道學不得以世間堪食之物投水火中道學不得教人以世間堪食之物投水火中道學不得貪世滋味道學不得教人貪世滋味道學不得貪食五辛道學不得教人貪食五辛道學不得為草書道學不得教人為草書道學不得以粗物易人好物道學不得以教人粗物易人好物道學不得知預軍國事物道學不得教人知預軍國事物道學不得設權變謀道學不得教人設權變謀道學不得無故見天子王侯道學不得教人無故見天子王侯道學不得干知天時指論星宿道學不得教人干知天時指論星宿道學不得以火燒田野山林道學不得教人以火燒田野山林道學不得無故摘衆草之花道學不得教人無故摘衆草之花道學不得親近惡人道學不得教人親近惡人道學不得無故伐樹木道學不得教人無故伐樹木道學不得人中多語參預流俗道學不得教人人中多語言參預流俗道學不得人中獨食道學不得教人人中獨食道學不得預世間婚姻事道學不得教人預世間婚姻事道學不得習世間妓樂道學不得教人習世間妓樂道學不得泄人隂惡私鄙道學不得教人泄人隂惡私鄙道學不得妄求窺人書疏道學不得教人妄求窺人書疏道學不得與女人獨語獨行道學不得與女人同行行必有宗道學不得與女人同座男女羣居道學不得與女人同食交錯衣物道學不得親教女人道學不得説人祖宗善惡道學不得靣譽世人道學不得以毒藥投淵池江海中道學不得教人以毒藥投淵池江海中道學不得親宗族道學不得踈異姓道學不得教人落子傷胎道學不得教人離別家室道學不得因恨報怨道學不得淫愛弟子道學不得妄聚集人衆道學不得教人妄聚集人衆道學不得投書讚世人道學不得教人投書讚世人道學不得自貴道學不得教人自貴道學不得自驕道學不得教人自驕道學不得自是用性道學不得教人自是用性道學不得妄多忌諱道學不得教人妄多忌諱道學不得希望人物道學不得教人希望人物道學不得竭陂池道學不得教人竭陂池道學不得評論師友才思長短道學不得輕慢經書訾毀法言道學不得教人輕慢經書訾毀法言道學不得薄賤老病道學不得教人薄賤老病道學不得棄薄乞人道學不得教人棄薄乞人道學不得恃威勢以凌世間道學不得教人恃威勢以淩世間道學不得阿黨所親道學不得教人阿黨所親道學不得與父母别門異戶道學不得教人與父母別門異戶道學不得嗔恚弟子道學不得嗔責世人道學不得罵人為奴婢畜生道學不得墨奴婢面傷其四體道學不得快人過失道學不得教人快人過失道學不得斂告煩擾世間道學不得為世俗人作禮主道學不得為人圖山立宅道學不得占知世間吉凶道學不得教人占知世間吉凶道學不得去就背向道學不得教人去就背向道學不得與世人羣處道學不得無故見貴人道學不得乘車載馬道學不得奪人所欲道學不得馳騁流俗求競世間道學不得慶弔世間求恱衆人道學不得掩他人之功名為己德道學不得卧寢金寶雕牀道學不得與名人飲食好惡道學不得驚懼百姓妄説哀厄道學不得驚懼鳥獸促以窮地道學不得妄驚怖老小道學不得輕凌官長有司道學不得預世間論議曲直道學不得施惠追吝道學不得遊遨無度道學不得妄登髙樓道學不得籠飛鳥走獸道學不得塞井及溝池道學不得快人家喪禍道學不得以𣗥橫人行道道學不得教人以𣗥橫人行道道學不得祠祀神祇道學不得教人祠祀神祇道學不得向神鬼禮拜道學不得教人向神鬼禮拜道學不得祼形三光妄呵風雨道學不得換舉人物不還債主道學不得折割人財道學不得勸人為惡事道學不得禁人為善事道學不得諸天齋戒而不齋戒念道道學不得違嵗六齋月中不齋道學不得違經教科戒禁律道學不得為人作辭訴道學不得唱論人惡道學不得信人言以恚世間道學不得笑人頑暗貧窮道學不得以意增減經戒道學不得傲慢三寶輕忽天人道學不得勸人謀反君長師父道學不得勸人不孝父母兄弟道學不得矯稱自號為真人道學不得信用外道雜術邪見不真道學不得衣物盈餘道學不得強人道學道學不得無經託學欺詐人神
