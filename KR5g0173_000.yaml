body:
  text: 右觀身戒從第一戒至一百八十上仙之道名玉清智慧下元戒品道學不得望人禮敬道學不得竊寫人經戒道學不得榮飾衣褐道學不得身不潔淨上髙座讀經道學與人同行當讓人以前道學與人同學夏執㸑供養道學與人同學冬執瓶供水道學與人同食當食其粗及菜道學與人同食當食正己前道學與人同學當敬先勝己道學與人同學住當任人處分道學與人同學當念教不解道學與人同學當請問先進道學人施惡於己己受惡不得有怨道學不得懷怨恚報於人道學與女人共語不得正視面容含笑相對道學與女人同渡水不得正眼看之道學失物不得疑似同學及衆人道學失物當委運自悔多罪道學多災病當恭巳自責念改往修來道學當忍人所不能忍道學當割人所不能割道學當衣人所不能衣道學當食人所不能食道學當學人所不能學道學當容人所不能容道學當受人所不能受道學當斷人所不能斷道學無經業精神浮散真想不通道學身不潔淨魂魄離人道學有心則天真髙逝魔官不服道學有家則三毒不滅三真不居道學有身則衆欲不去精思無應道學有虛心靜寂寞與真對道學當安玄泉不使妄動生元道學當滅識藏見然後真人見右觀身戒從第一至二百一十六無上正真之道名玉清智慧中元戒品道學當念菜食為常道學當念先度人後度己身道學當念居山林幽靜精思道學當念安貧讀經行道無倦道學當念燒衆名香流芳諸天徹魔境界道學當念在賢衆聽受妙旨道學當念請受三洞寶經勤身供養道學當念立功度人終劫不倦道學當念報師友本德終劫不怠道學當念國中清淨王化太平無有不道道學當念鄰國有道各守境界道學當念呪䫁百姓令常安全道學當念萬物為先不得道己道學當念逺鬼神不敬不慢道學當念逺在術禁忌之道道學當念逺聲色歌儛之術道學當念逺卒效鬼神妖妄之人道學當念崇本守真道學當念口不違心心不負形道學當念無疑惑聖文損益科法道學當念無求無欲道學當念清白守貞道學當念心無異想唯空唯寂道學當念家家安寧咸無苦痛道學當念世間憂厄之人罪繫苦惱咸得消釋道學當念天子聖明弘道皇家日盛道學當念主相弘輔常保有道道學當念天地日月風雨霜雪以時道學當念父母養我因緣道學當念七祖父母咸升天堂道學當念我師早得升度道學當念我同學未測道源淵奧典章道學當念同志轉相教𨗳令入正道道學當念不違其口所誦之文道學當念視人父母如已父母道學當念視人子過己子道學當念視人身過己身道學當念視人傷人痛過己身道學當念視人辱惡過其己身道學當念我宿命因緣根斷道學當念我胎根已絶不復世生同緣種親道學當念我生樹已枯神合太無無數之劫體道合真道學當念三塗路塞地獄長休道學當念中食養神棄諸肥滋道學當念愼太法常存三宫真人子丹道學當念觀世和光不驕於俗道學當念持三寶經戒常誦不輟道學當念存雌一誦大洞經眇若對神道學當念登仙度世乘雲駕龍道學當念欲見師友同學之人道學當念見真人道士修行法事道學當念見聖王治世海外稽首乘風向化道學當念食天厨自然之膳無飢渴之想道學當念與天真共對淡然無為道學當念使仙童玉女道學當念東遊青林東華道學當念南遊太丹南華道學當念西遊安養西華道學當念北遊碧羅北華道學當念遊東北方救百姓男女授其勸戒度入東北之門使得入無為之場道學當念遊東南方救百姓男女授其勸戒度入東南之門令得與道為因道學當念遊西南方救百姓男女授其勸戒度入西南之門令得入無為之道道學當念遊西北方救百姓男女授其勸戒度入西北之門當得升入至真之場道學當念遊遨留秦閬臺崑崙道學當念遊志齋堂講肄聖道敷釋淵賾道學當念遊上清金闕禮見真人太上道學當念遊王清七寶宫禮三元天尊道學當念遊玉清丹霞宫禮太上二十四髙聖道學當念遊太上玉京七寶流霞臺蔭蓋玉林禮太上天尊十方大聖終劫復始道學當念遊紫雲宫禮洞真三十九髙聖道學當念遊三十六天黃金宫禮天帝君道學當念遊九天黃金暉宫禮無上至真道學當念遊諸天宫宅與真人問道論經道學當念遊六天七寶宫觀化大魔王見我符籍以入仙品示離泉曲簿道學當念遊日月宫殿光明煥赫禮見日月王飲以日月華金液之漿道學當念遊大梵天流景宫禮四天帝王聽諸天誦詠霄絶雅妙道學當念遊諸天七寶林反生靈香流芳逆風聞三千里外師子飛龍鳴嘯其羽道學當念遊諸天浴池安座蓮華之上香潔自然流汩諸天池百千池皆如一處人人快樂道學當念遊諸天聽諸天妓樂無世間之想道學當念遊十方外天禮大聖象無上正真人道學當念遊下方無極金剛天宫禮諸元老真人道學當念逰天地名山隱宫洞室禮聖衆先得道人道學當念以心為道終無邪見異念當令心虛意泰不思不慮安思空寂道學當念隱祕天真名諱不出我口右觀身戒從第一至三百首太上無極之道名髙上玉清智慧上元戒品元始天王曰夫髙上洞真智慧經不宣世上學士皆多傳巳成真人見故難見而難盡是以希見於世矣是戒尊重不可以言宣觀歷人身諸神三百關節真靈不得妄出魔試不能得犯人受誦此戒不違其禁亦可不學而出雲霞碧輿自然迎子白日升天浮身空浪放十方項生圓光煥耀太無率天衆聖莫敢不敬仰於子也六天大魔王是時即舉奉戒之士東華宫言名大梵天宮大梵天宫言名玉京金闕刻以上仙之品元始天王曰大洞真經誦詠之萬遍雲駕下迎靈寶洞玄經有度劫之文其人修之而或不仙及金丹靈液不成何也故由不得修奉智慧觀身戒耳故是戒衆妙之妙威神極尊金華仙人九百立侍燒香焉是真祕之道不傳於文當誦習而巳夫學道不受此戒終不成仙或造業隨於聲色或始勤末懈或入山居家為衆魔所試敗或生異念疑惑真經或還從俗無復道心或輕慢師友毀辱同學或卒發狂癡性氣倒錯或貪財愛色反薄三寶或家道轗軻怨對悉會或惡夢亂想精神愁悶皆由無大戒以攝其心神三毒浮尸狡詐五府是知斯患也魔王不削泉曲死名三界不過仙品也元始天王曰是戒因靈仙而見今諸天諸地名山仙人悉奉而行焉每至朔望八節本命元辰諸天齋日同學師友入室説戒一周先禮十方每方一拜諸天聞説戒日皆各作禮焉弟子䫁欲奉戒當資上金五兩以為五帝之信丹錦十丈為十方質代夫落簮之盟不泄戒律以奉有戒之師對齋三日思念戒旨是夕當然十燈供養光明十方十方大聖以表我心矣若其時風雨雷霆激迅未可得受也當更齋戒重自恭肅臨時亦將神開意散矣奉戒九年神燭自明日月華丹金容內彂童顔充肌神通四逹與髙仙齊德出入無間能奉此大律戒則濯纓流汩之池解襟于七寶之臺逰觀華池之上蔭以反生香林金光鮮蔚從劫到劫永享道真本命日正中若夜半北向誦太上徊玄大品章以洞十方太上太微天帝曰是戒名智慧觀身戒一名保仙靈文一名髙上洞真度命靈丹自非有宿世功德垂慶纍業福𧙓所延者終不令見此寶祕矣東華無金簡玉名亦不使與是師相遇也能奉之者是子命應仙矣有經而無戒猶欲涉海而無舟楫猶有口而無舌何緣度兆身耶夫學者不知尋經知尋經而不知尋戒是未悟真要之根長夢而不覺可為痛心矣皆當量已能奉者資信受之受者九百年得口授一人不得過一人若過一人是為泄戒泄戒罪及七祖父母幽厄地獄身履三塗五苦八難終劫復始轉輪惡道去仙日逺𡨚家債主因時亦會各愼身焉太微天帝曰敢有竊聽戒者即為諸大魔所紏中必至之禍萬無疑矣若奉戒弟子獨處山林可畏之地鳴天鼓十二通心存戒神戒神衛已三重妖魔鬼魅不敢近福德當隨身諸天善神各各擁護也先是冤家債主皆生慈心矣太微天帝曰我昔始學之時唯知請經不知尋戒乃歷劫生死太上愍我道心髙聖哀我不懈見告云子學彌勤而不知奉觀身大戒當何由得仙乎我於是稽首金闕之下三千日太上見授要戒奉而修之九年之中雲輿來迎三界十方真人交會於玄虛矣故道學當以戒律為先道家之宗尊焉法應習誦上口古聖皆祕而盡書也今奉之亦然弗令文脫凡俗矣太上明燈頌未見然燈皆當誦此文不但受戒時也叩齒三通微為之勿使他聞聲凡叩齒悉爾太上散十方華燈通精誠諸天皆亦然諸地悉朗朗我身亦光徹五藏生華榮炎景照太無遐想繁玉清丹精寄太無玄陽空中嚮舍形滅苦根幽妙至真想垂華不現實因緣示光象我身亦如之乘化託流景夜光表陽丹迢迢照靈室諸天普光顯諸隂即已滅我神亦聰明常玩智與慧逍遙適道運遷謝任天勢舉形踊空洞夜燭煥流萃太微天帝曰徒然燈而不知此誦六天魔府不過人死命八方諸天不遣玉童玉女飛天真人降於子矣十方三界不度兆仙名於東華南宫不受子七祖父母化生之道太微天帝曰道舉不奉觀身大戒而誦經萬遍隱處山林升仙之舉恐未可希耶若能戒全於內和光於外猶庶幾乎靈標之涯也非道舉難奉戒難耳子能全戒余乃十方太上將保登仙也戒全而誦寶經佩大符若復不仙天下無有不死之道矣我之戒所慨世求其人難得耳末世多託聲名於浮華罕見道德之真心是以三寶沉昧聖人潛處豈道之不弘耶受戒若全十方大聖自然見於子也是不學而仙道成矣此不虛言不虛言欲何為哉正愍世間之志士耳因緣會當有可教者乎子其朂之子其勤之仙道既就何樂如之逍遙于太上玉京放任于自然之域是為歡樂太上前萬劫猶未始此之謂矣真非翰札所能宣也太極真人曰吾昔聞於太上言誦三寶洞經而不是大戒仙道衆妙胡緣而成耶故口口而已不宣於文將獨逸於三寶之苑囿矣宿無上仙之相好者亦終不令見也自非七祖積慶繁華垂條因緣纍葉宜功彌劫豈知䫁樂太上觀身之戒乎能奉是者便為太上大法師三寶之宗焉十方皆敬子於雲漢羣仙將引子於東華坐召天魔魔王舉兆符命於三界六天泉曲之府太山主者地官無復有應死之録籍也青宫仙名乃定於是耳將當為玉京之髙仙太上之真人焉太極真人曰夫道要在行合冥科積善內足然後始涉大道之境界耳自弗能爾者皆為徒勞於風塵無益生命之修短也道在我不由彼惟慈惟愛惟忍惟辱能行此四等亦與道為鄰矣能勤能信能髭能終能諌諍能棄色酒是為六度之法亦與真為儔矣能受非不自申能讓於人能不欲能容無理不爭能逺無道藏身幽處能不違心能不負經戒能不伐口戒所謂此八能亦善善為友矣太極真人曰戒律之為道威嚴神妙恐人不能有心歸奉故當祕而不書耳是以智慧經篇終不能悉顯於末學之士矣口口相傳將亦何由而泄耶當其説戒之時十方天人又手敬聽鬼神皆禮於所聞豈可輕而為哉太極真人曰夫古人之為道也玄寂靜神念真自然不動坐忘真道已成端拱雲車立迎矣或乘風凌空駕龍騁虛舉身踊無飛升太極體於空洞而無待也是以迹不可見世無我知知我者希則我者貴此之謂乎合符契矣若為師友恃詭言而為固非上古之法末學所制耳若必是學士䫁請寶經審觀其人意既洞悟便對經於太上前啓告而付之令案文而宗奉焉乃合太上玄科大法矣苟無弘道之才胡以七祖證十方而當違此哉自可先深思省子身能奉與否三塗地獄十苦八難豈可輕耶視之令心寒於諸賢善愼明戒則福自然矣背爾之心禍亦自然矣苦痛切身時刻叵過何况彌劫乎太極真人曰雖復終劫始劫是戒不易之道古人曰受而身行道成之日迹或顯或否於外世故不測其所修為矣是上古以披衣坐忘而得道軒轅陶鼎而龍迎故能洞觀十方超凌三界王喬赤松所以乘紫煙而髙翔天庭皆其類也不能具説具記此豈非所謂不學而仙道成者乎上清洞真智慧觀身大戒文
